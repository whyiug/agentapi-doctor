name: P00 bootstrap cross-platform

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: p00-bootstrap-cross-platform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  platform:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout exact revision without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # R3 validation replays the exact candidate source and R2 base tree.
          # A depth-1 PR merge checkout cannot prove either commit binding.
          fetch-depth: 0
          persist-credentials: false

      - name: Run dependency-free bootstrap validation
        shell: bash
        run: |
          python tools/phasegate/main.py bootstrap --root . > phasegate-result.json
          python -c "import json; p=json.load(open('phasegate-result.json',encoding='utf-8')); assert p['status']=='pass' and p['reasonCode']=='candidate_valid'"

      - name: Upload exact platform result
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: p00-bootstrap-${{ runner.os }}
          path: phasegate-result.json
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
  aggregate:
    needs: platform
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Download all exact platform results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: p00-bootstrap-*
          path: platform-results

      - name: Require three PASS results with one control-plane digest
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          paths = sorted(Path("platform-results").glob("*/phasegate-result.json"))
          if len(paths) != 3:
              raise SystemExit(f"expected exactly three platform results, got {len(paths)}")
          results = [json.loads(path.read_text(encoding="utf-8")) for path in paths]
          if any(item.get("status") != "pass" or item.get("reasonCode") != "candidate_valid" for item in results):
              raise SystemExit("at least one platform did not validate the exact candidate")
          digests = {item.get("controlPlaneDigest") for item in results}
          if len(digests) != 1:
              raise SystemExit(f"platform control-plane digests differ: {sorted(digests)}")
          summary = {
              "schemaVersion": "urn:agentapi-doctor:cross-platform-bootstrap:v1alpha1",
              "sourceCommit": "${{ github.sha }}",
              "controlPlaneDigest": next(iter(digests)),
              "platforms": ["Linux", "macOS", "Windows"],
              "result": "PASS",
          }
          Path("cross-platform-summary.json").write_text(
              json.dumps(summary, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload aggregate candidate evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: p00-bootstrap-cross-platform-${{ github.run_id }}
          path: cross-platform-summary.json
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
