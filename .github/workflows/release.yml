name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout complete immutable tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install the pinned Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          check-latest: false
      - name: Verify signed SemVer tag belongs to protected main
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          printf '%s\n' "$TAG" | grep -Eq '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-rc\.(0|[1-9][0-9]*))?$'
          test "$(git rev-parse "$TAG^{commit}")" = "$GITHUB_SHA"
          tag_object="$(git rev-parse "$TAG^{tag}")"
          mapfile -t ref_facts < <(
            gh api --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" \
              --jq '[.object.type,.object.sha] | .[]'
          )
          test "${#ref_facts[@]}" -eq 2
          test "${ref_facts[0]}" = tag
          test "${ref_facts[1]}" = "$tag_object"
          mapfile -t tag_facts < <(
            gh api --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/git/tags/$tag_object" \
              --jq '[.sha,.tag,.object.type,.object.sha,(.verification.verified|tostring),.verification.reason,(.verification.verified_at // "")] | .[]'
          )
          test "${#tag_facts[@]}" -eq 7
          test "${tag_facts[0]}" = "$tag_object"
          test "${tag_facts[1]}" = "$TAG"
          test "${tag_facts[2]}" = commit
          test "${tag_facts[3]}" = "$GITHUB_SHA"
          test "${tag_facts[4]}" = true
          test "${tag_facts[5]}" = valid
          test -n "${tag_facts[6]}"
          git fetch origin main --no-tags
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          remote_tag="$(git ls-remote origin "refs/tags/$TAG^{}")"
          test "$(printf '%s\n' "$remote_tag" | grep -c .)" -eq 1
          test "${remote_tag%%[[:space:]]*}" = "$GITHUB_SHA"
      - name: Bind exact version and reviewed release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          notes="release-notes/$TAG.md"
          python3 tools/check_release_notes.py --tag "$TAG" --file "$notes"
          printf 'RELEASE_VERSION=%s\nRELEASE_NOTES=%s\n' "$version" "$notes" >> "$GITHUB_ENV"
      - name: Install pinned static-analysis tools
        timeout-minutes: 8
        env:
          GOBIN: ${{ runner.temp }}/quality-tools
        run: |
          mkdir -p "$GOBIN"
          go install honnef.co/go/tools/cmd/staticcheck@2026.1
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          python3 -m pip install --disable-pip-version-check --no-deps ruff==0.15.5
          echo "$GOBIN" >> "$GITHUB_PATH"
      - name: Install and verify pinned actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "$ACTIONLINT_SHA256  $archive" | sha256sum --check --strict
          mkdir "$RUNNER_TEMP/actionlint"
          tar -xzf "$archive" -C "$RUNNER_TEMP/actionlint" actionlint
          "$RUNNER_TEMP/actionlint/actionlint" .github/workflows/*.yml
      - name: Run exact-commit product and security checks
        run: |
          make check
          go test -race ./...
          ruff check tools/*.py integrations
          staticcheck ./...
          govulncheck -test ./...
          make docker-check
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          go mod vendor
          git diff --exit-code -- vendor
          git diff --check
          git diff --exit-code
      - name: Build deterministic archives without publishing
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean --skip=publish
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./dist
          format: spdx-json
          output-file: ./dist/agentapi-doctor.spdx.json
          syft-version: v1.44.0
          upload-artifact: false
          upload-release-assets: false
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./dist
          format: cyclonedx-json
          output-file: ./dist/agentapi-doctor.cdx.json
          syft-version: v1.44.0
          upload-artifact: false
          upload-release-assets: false
      - name: Render exact package-manager assets
        run: |
          python3 integrations/homebrew/generate.py \
            --version "$RELEASE_VERSION" --checksums dist/checksums.txt --output-dir dist
          python3 integrations/scoop/generate.py \
            --version "$RELEASE_VERSION" --checksums dist/checksums.txt --output-dir dist
          (
            cd dist
            sha256sum agentapi-doctor.spdx.json agentapi-doctor.cdx.json \
              agentapi-doctor.rb agentapi-doctor.json >> checksums.txt
            LC_ALL=C sort -k2,2 -o checksums.txt checksums.txt
          )
      - name: Stage and validate the exact release asset set
        run: |
          mkdir release-dist
          python3 tools/release_assets.py --stage-from dist --directory release-dist \
            --version "$RELEASE_VERSION" --format json \
            --write-manifest "$RUNNER_TEMP/release-assets.json"
      - name: Upload verified release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-build-${{ github.sha }}
          path: release-dist/
          if-no-files-found: error
          retention-days: 7

  archive-smoke:
    name: Smoke ${{ matrix.target }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - {runner: ubuntu-24.04, target: linux-amd64}
          - {runner: ubuntu-24.04-arm, target: linux-arm64}
          - {runner: macos-15-intel, target: darwin-amd64}
          - {runner: macos-15, target: darwin-arm64}
          - {runner: windows-2025, target: windows-amd64}
          - {runner: windows-11-arm, target: windows-arm64}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - name: Checkout verifier only
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Download exact release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-build-${{ github.sha }}
          path: release-dist
      - name: Verify exact asset set, checksums, extraction, and binary identity
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          python3 tools/release_assets.py --directory release-dist --version "${VERSION#v}" --format json
          python3 tools/release_smoke.py release-dist \
            --version "${VERSION#v}" --commit "$GITHUB_SHA"

  publish:
    name: Sign, verify, and publish
    needs: archive-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment: release
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout exact tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Bind immutable release metadata
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          built_at="$(git show -s --format=%cI "$GITHUB_SHA")"
          printf 'RELEASE_VERSION=%s\nRELEASE_NOTES=%s\nBUILT_AT=%s\n' \
            "$version" "release-notes/$TAG.md" "$built_at" >> "$GITHUB_ENV"
      - name: Download six-platform verified release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-build-${{ github.sha }}
          path: release-dist
      - name: Reverify remote tag and reject published identities
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          test "$(git rev-parse "$TAG^{commit}")" = "$GITHUB_SHA"
          tag_object="$(git rev-parse "$TAG^{tag}")"
          mapfile -t ref_facts < <(
            gh api --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" \
              --jq '[.object.type,.object.sha] | .[]'
          )
          test "${#ref_facts[@]}" -eq 2
          test "${ref_facts[0]}" = tag
          test "${ref_facts[1]}" = "$tag_object"
          mapfile -t tag_facts < <(
            gh api --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/git/tags/$tag_object" \
              --jq '[.sha,.tag,.object.type,.object.sha,(.verification.verified|tostring),.verification.reason,(.verification.verified_at // "")] | .[]'
          )
          test "${#tag_facts[@]}" -eq 7
          test "${tag_facts[0]}" = "$tag_object"
          test "${tag_facts[1]}" = "$TAG"
          test "${tag_facts[2]}" = commit
          test "${tag_facts[3]}" = "$GITHUB_SHA"
          test "${tag_facts[4]}" = true
          test "${tag_facts[5]}" = valid
          test -n "${tag_facts[6]}"
          remote_tag="$(git ls-remote origin "refs/tags/$TAG^{}")"
          test "$(printf '%s\n' "$remote_tag" | grep -c .)" -eq 1
          test "${remote_tag%%[[:space:]]*}" = "$GITHUB_SHA"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release already exists; immutable publication refuses overwrite" >&2
            exit 2
          fi
          python3 tools/release_assets.py --directory release-dist \
            --version "$RELEASE_VERSION" --format json
      - name: Install keyless signing client
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Set up emulation
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Authenticate to GHCR with scoped token
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push Doctor image by unique build tag
        id: doctor-image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          target: doctor
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:build-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          build-args: |
            VERSION=${{ env.RELEASE_VERSION }}
            COMMIT=${{ github.sha }}
            BUILT_AT=${{ env.BUILT_AT }}
      - name: Build and push Registry image by unique build tag
        id: registry-image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          target: registry
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}-registry:build-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          build-args: |
            VERSION=${{ env.RELEASE_VERSION }}
            COMMIT=${{ github.sha }}
            BUILT_AT=${{ env.BUILT_AT }}
      - name: Generate Doctor image SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.doctor-image.outputs.digest }}
          format: spdx-json
          output-file: ./release-dist/agentapi-doctor-image.spdx.json
          syft-version: v1.44.0
          upload-artifact: false
          upload-release-assets: false
      - name: Generate Registry image SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository }}-registry@${{ steps.registry-image.outputs.digest }}
          format: spdx-json
          output-file: ./release-dist/agentapi-doctor-registry-image.spdx.json
          syft-version: v1.44.0
          upload-artifact: false
          upload-release-assets: false
      - name: Sign immutable image digests
        env:
          DOCTOR_IMAGE: ghcr.io/${{ github.repository }}@${{ steps.doctor-image.outputs.digest }}
          REGISTRY_IMAGE: ghcr.io/${{ github.repository }}-registry@${{ steps.registry-image.outputs.digest }}
        run: |
          cosign sign --yes "$DOCTOR_IMAGE"
          cosign sign --yes "$REGISTRY_IMAGE"
      - name: Attest Doctor image
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.doctor-image.outputs.digest }}
          push-to-registry: true
      - name: Attest Registry image
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}-registry
          subject-digest: ${{ steps.registry-image.outputs.digest }}
          push-to-registry: true
      - name: Smoke immutable image digests and exact version
        env:
          DOCTOR_IMAGE: ghcr.io/${{ github.repository }}@${{ steps.doctor-image.outputs.digest }}
          REGISTRY_IMAGE: ghcr.io/${{ github.repository }}-registry@${{ steps.registry-image.outputs.digest }}
        run: |
          for platform in linux/amd64 linux/arm64; do
            architecture="${platform#*/}"
            output="$RUNNER_TEMP/doctor-version-$architecture.json"
            docker run --platform "$platform" --rm --network=none --read-only \
              --cap-drop ALL --security-opt no-new-privileges \
              "$DOCTOR_IMAGE" version --json > "$output"
            python3 - "$output" "$RELEASE_VERSION" "$GITHUB_SHA" "$platform" <<'PY'
          import json
          import pathlib
          import sys
          payload = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          identity = payload.get("data", {})
          if payload.get("status") != "pass" or identity.get("version") != sys.argv[2] or identity.get("commit") != sys.argv[3]:
              raise SystemExit(f"Doctor OCI identity mismatch for {sys.argv[4]}")
          PY
            output="$RUNNER_TEMP/registry-version-$architecture.json"
            docker run --platform "$platform" --rm --network=none --read-only \
              --cap-drop ALL --security-opt no-new-privileges \
              "$REGISTRY_IMAGE" version > "$output"
            python3 - "$output" "$RELEASE_VERSION" "$GITHUB_SHA" "$platform" <<'PY'
          import json
          import pathlib
          import sys
          identity = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          if identity.get("version") != sys.argv[2] or identity.get("commit") != sys.argv[3]:
              raise SystemExit(f"Registry OCI identity mismatch for {sys.argv[4]}")
          PY
          done
      - name: Bind OCI digest subjects into the signed release assets
        env:
          DOCTOR_DIGEST: ${{ steps.doctor-image.outputs.digest }}
          DOCTOR_NAME: ghcr.io/${{ github.repository }}
          REGISTRY_DIGEST: ${{ steps.registry-image.outputs.digest }}
          REGISTRY_NAME: ghcr.io/${{ github.repository }}-registry
        run: |
          python3 - "$RELEASE_VERSION" "$GITHUB_SHA" \
            "$DOCTOR_NAME" "$DOCTOR_DIGEST" \
            "$REGISTRY_NAME" "$REGISTRY_DIGEST" \
            > release-dist/oci-images.json <<'PY'
          import json
          import re
          import sys

          version, commit, doctor_name, doctor_digest, registry_name, registry_digest = sys.argv[1:]
          if re.fullmatch(r"[0-9a-f]{40}", commit) is None:
              raise SystemExit("OCI subject commit is not a full SHA-1")
          images = []
          for role, name, digest in (
              ("doctor", doctor_name, doctor_digest),
              ("registry", registry_name, registry_digest),
          ):
              if re.fullmatch(r"ghcr\.io/[a-z0-9][a-z0-9._/-]*", name) is None:
                  raise SystemExit(f"unsafe OCI name for {role}")
              if re.fullmatch(r"sha256:[0-9a-f]{64}", digest) is None:
                  raise SystemExit(f"unsafe OCI digest for {role}")
              images.append({"digest": digest, "name": name, "role": role, "subject": f"{name}@{digest}"})
          payload = {
              "commit": commit,
              "images": images,
              "schema": "urn:agentapi-doctor:oci-release-subjects:v1",
              "version": version,
          }
          print(json.dumps(payload, sort_keys=True, separators=(",", ":")))
          PY
          (
            cd release-dist
            sha256sum oci-images.json agentapi-doctor-image.spdx.json \
              agentapi-doctor-registry-image.spdx.json >> checksums.txt
            LC_ALL=C sort -k2,2 -o checksums.txt checksums.txt
          )
          python3 tools/release_assets.py --directory release-dist \
            --version "$RELEASE_VERSION" --format json
          printf '### OCI digest subjects\n\n- %s@%s\n- %s@%s\n' \
            "$DOCTOR_NAME" "$DOCTOR_DIGEST" "$REGISTRY_NAME" "$REGISTRY_DIGEST" \
            >> "$GITHUB_STEP_SUMMARY"
      - name: Sign and validate the final release checksum manifest
        run: |
          cosign sign-blob --yes --bundle release-dist/checksums.txt.sigstore.json \
            release-dist/checksums.txt
          python3 tools/release_assets.py --directory release-dist \
            --version "$RELEASE_VERSION" --format json
      - name: Attest every final release file
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-dist/*
      - name: Create verified draft from an exact file allowlist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          mapfile -t assets < <(
            python3 tools/release_assets.py --directory release-dist \
              --version "$RELEASE_VERSION" --format lines
          )
          test "${#assets[@]}" -gt 0
          channel_flags=()
          case "$TAG" in
            *-rc.*) channel_flags+=(--prerelease) ;;
          esac
          gh release create "$TAG" --verify-tag --draft "${channel_flags[@]}" \
            --notes-file "$RELEASE_NOTES" --title "$TAG" "${assets[@]}"
      - name: Publish once with the final release channel
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --draft=false
      - name: Verify the public download location and Sigstore identity
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          mapfile -t release_facts < <(
            gh api --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" \
              --jq '[.tag_name,(.draft|tostring),(.prerelease|tostring),(.immutable|tostring)] | .[]'
          )
          test "${#release_facts[@]}" -eq 4
          test "${release_facts[0]}" = "$TAG"
          test "${release_facts[1]}" = false
          case "$TAG" in
            *-rc.*) test "${release_facts[2]}" = true ;;
            *) test "${release_facts[2]}" = false ;;
          esac
          test "${release_facts[3]}" = true
          mkdir public-dist
          gh release download "$TAG" --dir public-dist
          python3 tools/release_assets.py --directory public-dist \
            --version "$RELEASE_VERSION" --format json
          cosign verify-blob \
            --bundle public-dist/checksums.txt.sigstore.json \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yml@refs/tags/$TAG" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            public-dist/checksums.txt
          python3 tools/release_smoke.py public-dist \
            --version "$RELEASE_VERSION" --commit "$GITHUB_SHA"
      - name: Install again through the public verified installer
        id: public-install
        uses: ./integrations/github-action
        with:
          version: ${{ env.RELEASE_VERSION }}
          cosign-path: cosign
      - name: Smoke the publicly installed binary
        env:
          DOCTOR_PATH: ${{ steps.public-install.outputs.doctor-path }}
        run: |
          "$DOCTOR_PATH" version --json > "$RUNNER_TEMP/public-version.json"
          python3 - "$RUNNER_TEMP/public-version.json" "$RELEASE_VERSION" <<'PY'
          import json
          import pathlib
          import sys
          payload = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          if payload.get("status") != "pass" or payload.get("data", {}).get("version") != sys.argv[2]:
              raise SystemExit("public installer returned the wrong release version")
          PY
