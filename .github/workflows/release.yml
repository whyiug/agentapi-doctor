name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Exact dry-run version without a v prefix.
        required: true
        default: 0.1.0-rc.1
        type: string

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

concurrency:
  group: release-${{ github.ref }}-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Doctor release assets
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    outputs:
      commit: ${{ steps.identity.outputs.commit }}
      tag: ${{ steps.identity.outputs.tag }}
      version: ${{ steps.identity.outputs.version }}
    steps:
      - name: Checkout complete source history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install the pinned Go toolchain
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          check-latest: false
      - name: Bind an exact version to a commit on main
        id: identity
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if test "$EVENT_NAME" = push; then
            tag="$REF_NAME"
            version="${tag#v}"
            test "$(git rev-parse "$tag^{commit}")" = "$GITHUB_SHA"
          else
            version="$INPUT_VERSION"
            tag="v$version"
            git tag --force "$tag" "$GITHUB_SHA"
          fi
          printf '%s\n' "$tag" | grep -Eq '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-rc\.(0|[1-9][0-9]*))?$'
          git fetch origin main --no-tags
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          notes="release-notes/$tag.md"
          python3 tools/check_release_notes.py --tag "$tag" --file "$notes"
          printf 'RELEASE_VERSION=%s\nRELEASE_TAG=%s\nRELEASE_NOTES=%s\n' \
            "$version" "$tag" "$notes" >> "$GITHUB_ENV"
          printf 'commit=%s\ntag=%s\nversion=%s\n' \
            "$GITHUB_SHA" "$tag" "$version" >> "$GITHUB_OUTPUT"
      - name: Run Doctor and release-specific checks
        run: |
          go test ./internal/cli ./internal/productrun ./internal/report ./internal/transport
          python3 -m unittest discover -s tools -p 'test_release_*.py'
          git diff --check
      - name: Build six native Doctor archives without publishing
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean --skip=publish
      - name: Generate one SPDX release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./dist
          format: spdx-json
          output-file: ./dist/agentapi-doctor.spdx.json
          syft-version: v1.44.0
          upload-artifact: false
          upload-release-assets: false
      - name: Bind the SPDX SBOM into the checksum manifest
        shell: bash
        run: |
          (
            cd dist
            sha256sum agentapi-doctor.spdx.json >> checksums.txt
            LC_ALL=C sort -k2,2 -o checksums.txt checksums.txt
          )
      - name: Stage the exact Doctor-only release asset set
        run: |
          mkdir release-dist
          python3 tools/release_assets.py --stage-from dist --directory release-dist \
            --version "$RELEASE_VERSION" --format json \
            --write-manifest "$RUNNER_TEMP/release-assets.json"
      - name: Upload the verified dry-run asset set
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: doctor-release-build-${{ github.sha }}
          path: release-dist/
          if-no-files-found: error
          retention-days: 7

  archive-smoke:
    name: Archive smoke / ${{ matrix.target }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - {runner: ubuntu-24.04, target: linux-amd64, python: python3}
          - {runner: macos-15, target: darwin-arm64, python: python3}
          - {runner: windows-2025, target: windows-amd64, python: python}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    steps:
      - name: Checkout the exact smoke verifier
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Start the two-minute packaging timer
        shell: bash
        env:
          PYTHON: ${{ matrix.python }}
        run: |
          "$PYTHON" -c 'import time; print(f"SMOKE_STARTED_AT={time.time()}")' \
            >> "$GITHUB_ENV"
      - name: Download the exact dry-run assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: doctor-release-build-${{ github.sha }}
          path: release-dist
      - name: Verify archive identity and run the offline demo
        shell: bash
        env:
          COMMIT: ${{ needs.build.outputs.commit }}
          PYTHON: ${{ matrix.python }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          "$PYTHON" tools/release_assets.py --directory release-dist \
            --version "$VERSION" --format json
          "$PYTHON" tools/release_smoke.py release-dist \
            --version "$VERSION" --commit "$COMMIT" \
            --started-at-epoch "$SMOKE_STARTED_AT" --max-seconds 120

  publish:
    name: Sign, attest, and publish
    if: github.event_name == 'push'
    needs: [build, archive-smoke]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout the exact tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Download the smoke-tested assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: doctor-release-build-${{ github.sha }}
          path: release-dist
      - name: Reverify tag ancestry and prepare a recoverable release slot
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          test "$TAG" = "$GITHUB_REF_NAME"
          test "$(git rev-parse "$TAG^{commit}")" = "$GITHUB_SHA"
          git fetch origin main --no-tags
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          mapfile -t existing < <(
            gh api --paginate \
              "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
              --jq '.[] | select(.tag_name == "'"$TAG"'") | [.id,(.draft|tostring),((.immutable // false)|tostring)] | .[]'
          )
          if test "${#existing[@]}" -ne 0; then
            test "${#existing[@]}" -eq 3
            if test "${existing[1]}" = true && test "${existing[2]}" = false; then
              gh api --method DELETE \
                "repos/$GITHUB_REPOSITORY/releases/${existing[0]}"
            else
              echo "published or immutable release already exists; refusing overwrite" >&2
              exit 2
            fi
          fi
          python3 tools/release_assets.py --directory release-dist \
            --version "$VERSION" --format json
      - name: Install the keyless signing client
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Sign and validate the checksum manifest
        env:
          TAG: ${{ needs.build.outputs.tag }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          cosign sign-blob --yes --bundle release-dist/checksums.txt.sigstore.json \
            release-dist/checksums.txt
          cosign verify-blob \
            --bundle release-dist/checksums.txt.sigstore.json \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yml@refs/tags/$TAG" \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            release-dist/checksums.txt
          python3 tools/release_assets.py --directory release-dist \
            --version "$VERSION" --format json
      - name: Generate GitHub build provenance for every release file
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-dist/*
      - name: Create a draft from the exact file allowlist
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: release-notes/${{ needs.build.outputs.tag }}.md
          TAG: ${{ needs.build.outputs.tag }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          mapfile -t assets < <(
            python3 tools/release_assets.py --directory release-dist \
              --version "$VERSION" --format lines
          )
          test "${#assets[@]}" -eq 9
          channel_flags=()
          case "$TAG" in
            *-rc.*) channel_flags+=(--prerelease) ;;
          esac
          gh release create "$TAG" --verify-tag --draft "${channel_flags[@]}" \
            --notes-file "$NOTES" --title "$TAG" "${assets[@]}"
      - name: Publish once with the final release channel
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
        run: gh release edit "$TAG" --draft=false
      - name: Verify immutable public release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          mapfile -t facts < <(
            gh api --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" \
              --jq '[.tag_name,(.draft|tostring),(.prerelease|tostring),(.immutable|tostring),(.assets|length|tostring)] | .[]'
          )
          test "${#facts[@]}" -eq 5
          test "${facts[0]}" = "$TAG"
          test "${facts[1]}" = false
          case "$TAG" in
            *-rc.*) test "${facts[2]}" = true ;;
            *) test "${facts[2]}" = false ;;
          esac
          test "${facts[3]}" = true
          test "${facts[4]}" = 9

  public-smoke:
    name: Anonymous public smoke / ${{ matrix.target }}
    if: github.event_name == 'push'
    needs: [build, publish]
    strategy:
      fail-fast: false
      matrix:
        include:
          - {runner: ubuntu-24.04, target: linux-amd64, os: linux, arch: amd64, extension: tar.gz, python: python3}
          - {runner: macos-15, target: darwin-arm64, os: darwin, arch: arm64, extension: tar.gz, python: python3}
          - {runner: windows-2025, target: windows-amd64, os: windows, arch: amd64, extension: zip, python: python}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout the exact public smoke verifier
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Install the Sigstore verifier
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Download the public files anonymously
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          EXTENSION: ${{ matrix.extension }}
          PYTHON: ${{ matrix.python }}
          TAG: ${{ needs.build.outputs.tag }}
          TARGET_OS: ${{ matrix.os }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          started_at="$($PYTHON -c 'import time; print(time.time())')"
          printf 'SMOKE_STARTED_AT=%s\n' "$started_at" >> "$GITHUB_ENV"
          archive="agentapi-doctor_${VERSION}_${TARGET_OS}_${ARCH}.${EXTENSION}"
          base="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG"
          mkdir public-dist
          for asset in "$archive" checksums.txt checksums.txt.sigstore.json; do
            curl --fail --location --proto '=https' --tlsv1.2 \
              --output "public-dist/$asset" "$base/$asset"
          done
      - name: Verify the signed checksum manifest
        shell: bash
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          cosign verify-blob \
            --bundle public-dist/checksums.txt.sigstore.json \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yml@refs/tags/$TAG" \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            public-dist/checksums.txt
      - name: Run the anonymously downloaded Doctor demo
        shell: bash
        env:
          COMMIT: ${{ needs.build.outputs.commit }}
          PYTHON: ${{ matrix.python }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          "$PYTHON" tools/release_smoke.py public-dist \
            --version "$VERSION" --commit "$COMMIT" \
            --started-at-epoch "$SMOKE_STARTED_AT" --max-seconds 120
      - name: Smoke the public fixed-tag installer
        if: matrix.target == 'linux-amd64'
        shell: bash
        env:
          TAG: ${{ needs.build.outputs.tag }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          installer="$RUNNER_TEMP/install.sh"
          install_root="$RUNNER_TEMP/doctor-installer-bin"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$installer" \
            "https://raw.githubusercontent.com/$GITHUB_REPOSITORY/$TAG/install.sh"
          AGENTAPI_DOCTOR_VERSION="$VERSION" \
            AGENTAPI_DOCTOR_INSTALL_DIR="$install_root" \
            sh "$installer"
          "$install_root/doctor" version --json > "$RUNNER_TEMP/installer-version.json"
          python3 - "$RUNNER_TEMP/installer-version.json" "$VERSION" <<'PY'
          import json
          import pathlib
          import sys
          payload = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          if payload.get("status") != "pass" or payload.get("data", {}).get("version") != sys.argv[2]:
              raise SystemExit("public installer returned the wrong release version")
          PY
          mkdir "$RUNNER_TEMP/installer-demo"
          (
            cd "$RUNNER_TEMP/installer-demo"
            "$install_root/doctor" demo --format terminal
          )
