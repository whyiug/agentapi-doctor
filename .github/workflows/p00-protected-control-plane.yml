name: P00 protected control-plane

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: p00-control-plane-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: P00 protected control-plane / verify
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      HOME: /tmp/agentapi-doctor-p00-home
      LC_ALL: C.UTF-8
      TZ: UTC
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - name: Checkout exact revision without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate the complete P00 control plane and adversarial suite
        run: |
          restriction=/proc/sys/kernel/apparmor_restrict_unprivileged_userns
          original_restriction=

          probe_namespace() {
            local parent_namespace child_namespace
            if ! parent_namespace="$(/usr/bin/stat -Lc '%i' /proc/self/ns/net)"; then
              return 1
            fi
            if ! child_namespace="$(
              /usr/bin/unshare --user --map-root-user --net -- \
                /usr/bin/stat -Lc '%i' /proc/self/ns/net
            )"; then
              return 1
            fi
            [[ "$parent_namespace" =~ ^[0-9]+$ &&
              "$child_namespace" =~ ^[0-9]+$ &&
              "$parent_namespace" != "$child_namespace" ]]
          }

          restore_restriction() {
            local prior_status=$? restored
            trap - EXIT
            if ! printf '%s\n' "$original_restriction" |
              /usr/bin/sudo /usr/bin/tee "$restriction" >/dev/null; then
              prior_status=1
            fi
            if ! restored="$(/usr/bin/sudo /usr/bin/cat "$restriction")"; then
              prior_status=1
            elif test "$restored" != "$original_restriction"; then
              prior_status=1
            fi
            exit "$prior_status"
          }

          if ! probe_namespace; then
            original_restriction="$(/usr/bin/sudo /usr/bin/cat "$restriction")"
            test "$original_restriction" = 1
            trap restore_restriction EXIT
            printf '0\n' | /usr/bin/sudo /usr/bin/tee "$restriction" >/dev/null
            test "$(/usr/bin/sudo /usr/bin/cat "$restriction")" = 0
            probe_namespace
          fi

          mkdir -p "$HOME"
          PYTHONPATH=test/bootstrap python3 -m unittest \
            test_run_executor.RunExecutorTests.test_bootstrap_cannot_reach_host_loopback_or_external_route
          make verify

      - name: Confirm PRE_GENESIS remains fail closed
        run: |
          python3 tools/phasegate/main.py state-verify --root .
          if python3 tools/phasegate/main.py gate-unit P00.W01 --root .; then
            echo '::error::P00.W01 passed without verified Genesis'
            exit 1
          fi
