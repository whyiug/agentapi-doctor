name: P00 protected state writer

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Strict writer mode
        required: true
        default: genesis
        type: choice
        options:
          - genesis
          - append
      candidate_sha:
        description: Exact independently approved P00 control-plane source commit
        required: false
        type: string
      workflow_execution_sha:
        description: Exact protected-main commit executing this workflow
        required: true
        type: string
      approval_b64:
        description: Base64 of the detached P00.B00-R3 SSHSIG approval envelope
        required: false
        type: string
      bootstrap_request_commit:
        description: Append only; exact commit containing the approved R3 request
        required: false
        type: string
      chain_run_id:
        description: Append only; numeric same-repository run containing the chain artifact
        required: false
        type: string
      chain_artifact_id:
        description: Append only; numeric immutable chain artifact ID
        required: false
        type: string
      bundle_run_id:
        description: Append only; numeric same-repository run containing the authorization bundle
        required: false
        type: string
      bundle_artifact_id:
        description: Append only; numeric immutable authorization bundle artifact ID
        required: false
        type: string
      expected_chain_head_digest:
        description: Append only; externally observed current chain head
        required: false
        type: string
      expected_bundle_digest:
        description: Append only; optional canonical authorization bundle digest
        required: false
        type: string
      operation:
        description: Append only; exact protected operation
        required: false
        type: string
      to_state:
        description: Append only; exact target state
        required: false
        type: string
      work_unit:
        description: Append only; exact P00 work unit
        required: false
        type: string
      phase:
        description: Append only; exact phase (P00); phase-transition omits work_unit
        required: false
        type: string

permissions:
  # Repository metadata is always readable by GITHUB_TOKEN.  No mutation
  # permission is granted; contents is read-only and id-token only mints the
  # short-lived provenance JWT.
  contents: read
  actions: read
  id-token: write

concurrency:
  group: p00-protected-state-writer
  cancel-in-progress: false

jobs:
  genesis:
    name: verify and create signed Genesis artifact
    if: >-
      inputs.mode == 'genesis' &&
      github.repository == 'whyiug/agentapi-doctor' &&
      github.ref == 'refs/heads/main' &&
      github.ref_protected == true &&
      github.run_attempt == 1
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      HOME: ${{ runner.temp }}/isolated-home
      LC_ALL: C.UTF-8
      TZ: UTC
      CANDIDATE_SHA: ${{ inputs.candidate_sha }}
      WORKFLOW_EXECUTION_SHA: ${{ inputs.workflow_execution_sha }}
      APPROVAL_B64: ${{ inputs.approval_b64 }}
      BOOTSTRAP_REQUEST_COMMIT: ${{ inputs.bootstrap_request_commit }}
      CHAIN_RUN_ID: ${{ inputs.chain_run_id }}
      CHAIN_ARTIFACT_ID: ${{ inputs.chain_artifact_id }}
      BUNDLE_RUN_ID: ${{ inputs.bundle_run_id }}
      BUNDLE_ARTIFACT_ID: ${{ inputs.bundle_artifact_id }}
      EXPECTED_CHAIN_HEAD_DIGEST: ${{ inputs.expected_chain_head_digest }}
      EXPECTED_BUNDLE_DIGEST: ${{ inputs.expected_bundle_digest }}
      OPERATION: ${{ inputs.operation }}
      TO_STATE: ${{ inputs.to_state }}
      WORK_UNIT: ${{ inputs.work_unit }}
      PHASE: ${{ inputs.phase }}
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - name: Validate immutable inputs before checkout
        run: |
          mkdir -p "$HOME"
          test "${{ inputs.mode }}" = genesis
          test -n "$APPROVAL_B64"
          test -z "$BOOTSTRAP_REQUEST_COMMIT$CHAIN_RUN_ID$CHAIN_ARTIFACT_ID"
          test -z "$BUNDLE_RUN_ID$BUNDLE_ARTIFACT_ID$EXPECTED_CHAIN_HEAD_DIGEST"
          test -z "$EXPECTED_BUNDLE_DIGEST$OPERATION$TO_STATE$WORK_UNIT$PHASE"
          [[ "$CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo '::error::candidate_sha must be a full lowercase commit'
            exit 2
          }
          [[ "$WORKFLOW_EXECUTION_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo '::error::workflow_execution_sha must be a full lowercase commit'
            exit 2
          }
          test "$WORKFLOW_EXECUTION_SHA" = "$GITHUB_SHA" || {
            echo '::error::main moved after the independently signed approval'
            exit 3
          }

      - name: Checkout exact approved control plane as untrusted comparison data
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.candidate_sha }}
          path: trusted
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout exact request/workflow commit as data and Git proof
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.workflow_execution_sha }}
          path: request-input
          fetch-depth: 1
          persist-credentials: false

      - name: Decode only the detached approval data
        run: |
          mkdir -p "$RUNNER_TEMP/p00-writer-input" "$RUNNER_TEMP/p00-writer-output"
          python3 - <<'PY'
          import base64
          import binascii
          import os
          from pathlib import Path

          encoded = os.environ["APPROVAL_B64"]
          if not encoded or len(encoded) > 131072 or any(ch.isspace() for ch in encoded):
              raise SystemExit("approval_b64 is empty, oversized, or noncanonical")
          try:
              raw = base64.b64decode(encoded, validate=True)
          except (ValueError, binascii.Error) as exc:
              raise SystemExit(f"approval_b64 is invalid: {exc}")
          if base64.b64encode(raw).decode("ascii") != encoded or len(raw) > 65536:
              raise SystemExit("approval_b64 is noncanonical or oversized")
          target = Path(os.environ["RUNNER_TEMP"]) / "p00-writer-input/approval.json"
          target.write_bytes(raw)
          target.chmod(0o600)
          PY

      - name: Verify approval and create one digest-bound OIDC Genesis
        env:
          PYTHONPATH: request-input
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          from datetime import datetime, timezone
          import json
          import os
          from pathlib import Path

          from tools.phasegate.oidc import jwks_snapshot_digest
          from tools.phasegate.chain_artifact import encode_chain_artifact
          from tools.phasegate.protected import document_digest, load_strict_document
          from tools.phasegate.protected_v2 import (
              validate_trust_policy_v2,
              verify_control_plane_approval_v2,
              verify_genesis_event_v2,
          )
          from tools.phasegate.state_writer import create_genesis_event
          from tools.phasegate.validation import validate_bootstrap_candidate

          runner_temp = Path(os.environ["RUNNER_TEMP"])
          trusted = Path("trusted").resolve()
          request_root = Path("request-input").resolve()
          candidate_sha = os.environ["CANDIDATE_SHA"]
          workflow_sha = os.environ["WORKFLOW_EXECUTION_SHA"]

          candidate = validate_bootstrap_candidate(
              trusted,
              require_request=False,
              require_pre_genesis=True,
          )
          execution = validate_bootstrap_candidate(
              request_root,
              require_request=True,
              require_pre_genesis=True,
          )
          if (
              execution["controlPlaneDigest"] != candidate["controlPlaneDigest"]
              or execution["componentDigests"] != candidate["componentDigests"]
          ):
              raise SystemExit(
                  "protected main execution code differs from the approved candidate"
              )
          request = load_strict_document(
              request_root / "execution/approval-requests/P00.B00-R3.yaml",
              label="request",
          )
          approval = load_strict_document(
              runner_temp / "p00-writer-input/approval.json",
              label="approval",
          )
          policy = load_strict_document(
              trusted / "execution/protected-verifier/trust-policy.yaml",
              label="policy",
          )
          jwks = load_strict_document(
              trusted / "execution/protected-verifier/github-actions-oidc-jwks.json",
              label="jwks",
          )
          policy_digest = document_digest(policy)
          request_digest = document_digest(request)
          snapshot_digest = jwks_snapshot_digest(jwks)
          now = datetime.now(timezone.utc).replace(microsecond=0)

          verified = verify_control_plane_approval_v2(
              request=request,
              approval=approval,
              policy=policy,
              jwks_snapshot=jwks,
              expected_policy_digest=policy_digest,
              expected_jwks_snapshot_digest=snapshot_digest,
              expected_control_plane_digest=candidate["controlPlaneDigest"],
              expected_candidate_source_commit=candidate_sha,
              expected_request_digest=request_digest,
              expected_workflow_execution_commit=workflow_sha,
              consumption_time=now,
          )
          claims = {
              "repository": "whyiug/agentapi-doctor",
              "repository_id": "1296831403",
              "repository_owner": "whyiug",
              "repository_owner_id": "6668626",
              "repository_visibility": "public",
              "event_name": "workflow_dispatch",
              "ref": "refs/heads/main",
              "ref_type": "branch",
              "ref_protected": "true",
              "runner_environment": "github-hosted",
              "actor_id": "6668626",
              "workflow_ref": "whyiug/agentapi-doctor/.github/workflows/p00-protected-state-writer.yml@refs/heads/main",
              "workflow_sha": workflow_sha,
              "sha": workflow_sha,
          }
          event = create_genesis_event(
              approval_result=verified,
              contract_digests=candidate["componentDigests"],
              source_commit=candidate_sha,
              control_plane_digest=candidate["controlPlaneDigest"],
              trust_policy_digest=policy_digest,
              approved_jwks=jwks,
              expected_jwks_snapshot_digest=snapshot_digest,
              expected_claims=claims,
              workflow_path=".github/workflows/p00-protected-state-writer.yml",
              workflow_execution_commit=workflow_sha,
              statement_timestamp=now,
          )
          policy_result = validate_trust_policy_v2(
              policy,
              jwks_snapshot=jwks,
              expected_policy_digest=policy_digest,
              expected_jwks_snapshot_digest=snapshot_digest,
              expected_control_plane_digest=candidate["controlPlaneDigest"],
          )
          view = verify_genesis_event_v2(
              event=event,
              policy_result=policy_result,
              approval_result=verified,
              jwks_snapshot=jwks,
              expected_control_plane_digest=candidate["controlPlaneDigest"],
              expected_chain_head_digest=event["eventDigest"],
              contract_digests=candidate["componentDigests"],
              repo_root=request_root,
          )
          output = runner_temp / "p00-writer-output"
          chain = encode_chain_artifact(
              bootstrap_approval=approval,
              genesis_event=event,
              entries=(),
          )
          (output / "chain.json").write_bytes(chain)
          (output / "00000000.json").write_bytes(
              json.dumps(event, ensure_ascii=False, sort_keys=True, separators=(",", ":")).encode("utf-8") + b"\n"
          )
          (output / "phase-state.yaml").write_bytes(
              json.dumps(view, ensure_ascii=False, sort_keys=True, separators=(",", ":")).encode("utf-8") + b"\n"
          )
          summary = {
              "status": "verified_oidc_genesis_candidate",
              "eventDigest": event["eventDigest"],
              "stateDigest": view["stateDigest"],
              "sourceCommit": candidate_sha,
              "workflowExecutionCommit": workflow_sha,
              "controlPlaneDigest": candidate["controlPlaneDigest"],
              "approvalDigest": verified["approvalDigest"],
              "trustPolicyDigest": policy_digest,
              "jwksSnapshotDigest": snapshot_digest,
              "repositoryProtectionEvidenceDigest": event["body"]["repositoryProtection"]["apiEvidenceDigest"],
              "chainArtifactDigest": json.loads(chain)["artifactDigest"],
          }
          (output / "verification-result.json").write_text(
              json.dumps(summary, ensure_ascii=False, sort_keys=True, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload immutable candidate artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: p00-genesis-${{ github.run_id }}
          path: ${{ runner.temp }}/p00-writer-output
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

      # The workflow has no contents:write permission. Importing the verified
      # artifact and its exact derived view requires a separately reviewed PR;
      # no candidate or approval code, hook, dependency, or Makefile executes.

  append:
    name: replay and append one signed protected event
    if: >-
      inputs.mode == 'append' &&
      github.repository == 'whyiug/agentapi-doctor' &&
      github.ref == 'refs/heads/main' &&
      github.ref_protected == true &&
      github.run_attempt == 1
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      HOME: ${{ runner.temp }}/isolated-home
      LC_ALL: C.UTF-8
      TZ: UTC
      CANDIDATE_SHA: ${{ inputs.candidate_sha }}
      WORKFLOW_EXECUTION_SHA: ${{ inputs.workflow_execution_sha }}
      APPROVAL_B64: ${{ inputs.approval_b64 }}
      BOOTSTRAP_REQUEST_COMMIT: ${{ inputs.bootstrap_request_commit }}
      CHAIN_RUN_ID: ${{ inputs.chain_run_id }}
      CHAIN_ARTIFACT_ID: ${{ inputs.chain_artifact_id }}
      BUNDLE_RUN_ID: ${{ inputs.bundle_run_id }}
      BUNDLE_ARTIFACT_ID: ${{ inputs.bundle_artifact_id }}
      EXPECTED_CHAIN_HEAD_DIGEST: ${{ inputs.expected_chain_head_digest }}
      EXPECTED_BUNDLE_DIGEST: ${{ inputs.expected_bundle_digest }}
      OPERATION: ${{ inputs.operation }}
      TO_STATE: ${{ inputs.to_state }}
      WORK_UNIT: ${{ inputs.work_unit }}
      PHASE: ${{ inputs.phase }}
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - name: Validate append mode and immutable external pins
        run: |
          mkdir -p "$HOME" "$RUNNER_TEMP/p00-writer-input" "$RUNNER_TEMP/p00-writer-output-parent"
          test "${{ inputs.mode }}" = append
          test -z "$CANDIDATE_SHA$APPROVAL_B64"
          [[ "$WORKFLOW_EXECUTION_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$WORKFLOW_EXECUTION_SHA" = "$GITHUB_SHA" || {
            echo '::error::workflow_execution_sha must equal the exact protected-main checkout'
            exit 3
          }
          [[ "$BOOTSTRAP_REQUEST_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$CHAIN_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "$CHAIN_ARTIFACT_ID" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "$BUNDLE_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "$BUNDLE_ARTIFACT_ID" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "$EXPECTED_CHAIN_HEAD_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          if test -n "$EXPECTED_BUNDLE_DIGEST"; then
            [[ "$EXPECTED_BUNDLE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          fi
          test "$PHASE" = P00
          case "$OPERATION" in
            work-unit-convergence|work-unit-readiness|work-unit-activation|evidence-attachment)
              [[ "$WORK_UNIT" =~ ^P00\.W(0[1-9]|[1-9][0-9])$ ]]
              ;;
            phase-transition)
              test -z "$WORK_UNIT"
              ;;
            *) echo '::error::unsupported append operation'; exit 2 ;;
          esac
          [[ "$TO_STATE" =~ ^[A-Z][A-Z_]{1,63}$ ]]

      - name: Checkout exact protected workflow commit with full approved ancestry
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.workflow_execution_sha }}
          path: request-input
          fetch-depth: 0
          persist-credentials: false

      - name: Download exact same-repository chain artifact by immutable ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ inputs.chain_artifact_id }}
          path: ${{ runner.temp }}/p00-writer-input/downloaded-chain
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.chain_run_id }}

      - name: Download exact same-repository authorization bundle by immutable ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ inputs.bundle_artifact_id }}
          path: ${{ runner.temp }}/p00-writer-input/downloaded-bundle
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.bundle_run_id }}

      - name: Normalize untrusted artifacts to fixed data-only files
        run: |
          python3 - <<'PY'
          import os
          import stat
          from pathlib import Path

          runner_temp = Path(os.environ["RUNNER_TEMP"])

          def copy_one(source_name, expected_name, target_name, maximum):
              source = runner_temp / "p00-writer-input" / source_name
              entries = list(source.rglob("*"))
              if any(item.is_symlink() for item in entries):
                  raise SystemExit(f"{source_name} contains a symlink")
              files = [item for item in entries if item.is_file()]
              if len(files) != 1 or files[0].name != expected_name:
                  raise SystemExit(f"{source_name} must contain exactly {expected_name}")
              flags = os.O_RDONLY | os.O_CLOEXEC
              if hasattr(os, "O_NOFOLLOW"):
                  flags |= os.O_NOFOLLOW
              descriptor = os.open(files[0], flags)
              try:
                  before = os.fstat(descriptor)
                  if not stat.S_ISREG(before.st_mode):
                      raise SystemExit(f"{source_name} is not a regular file")
                  if before.st_size <= 0 or before.st_size > maximum:
                      raise SystemExit(f"{source_name} size is outside the fixed bound")
                  chunks = []
                  remaining = maximum + 1
                  while remaining:
                      chunk = os.read(descriptor, min(1024 * 1024, remaining))
                      if not chunk:
                          break
                      chunks.append(chunk)
                      remaining -= len(chunk)
                  after = os.fstat(descriptor)
              finally:
                  os.close(descriptor)
              raw = b"".join(chunks)
              identity = lambda value: (
                  value.st_dev, value.st_ino, value.st_size, value.st_mtime_ns
              )
              if len(raw) != before.st_size or len(raw) > maximum or identity(before) != identity(after):
                  raise SystemExit(f"{source_name} changed while being read")
              target = runner_temp / "p00-writer-input" / target_name
              target.write_bytes(raw)
              target.chmod(0o600)

          copy_one("downloaded-chain", "chain.json", "chain.json", 64 * 1024 * 1024)
          copy_one(
              "downloaded-bundle",
              "authorization-bundle.json",
              "authorization-bundle.json",
              80 * 1024 * 1024,
          )
          PY

      - name: Replay exact chain and append one digest-bound OIDC event
        env:
          PYTHONPATH: request-input
        run: |
          args=(
            protected-chain-append
            --chain "$RUNNER_TEMP/p00-writer-input/chain.json"
            --bootstrap-request-commit "$BOOTSTRAP_REQUEST_COMMIT"
            --expected-current-chain-head-digest "$EXPECTED_CHAIN_HEAD_DIGEST"
            --current-workflow-execution-commit "$WORKFLOW_EXECUTION_SHA"
            --operation "$OPERATION"
            --to-state "$TO_STATE"
            --phase "$PHASE"
            --bundle "$RUNNER_TEMP/p00-writer-input/authorization-bundle.json"
            --output "$RUNNER_TEMP/p00-writer-output-parent/verified-output"
            --root request-input
          )
          if test -n "$WORK_UNIT"; then
            args+=(--work-unit "$WORK_UNIT")
          fi
          if test -n "$EXPECTED_BUNDLE_DIGEST"; then
            args+=(--expected-bundle-digest "$EXPECTED_BUNDLE_DIGEST")
          fi
          python3 request-input/tools/phasegate/main.py "${args[@]}"

      - name: Upload immutable one-day append artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: p00-chain-${{ github.run_id }}
          path: ${{ runner.temp }}/p00-writer-output-parent/verified-output
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
