version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule: {interval: weekly, day: monday, time: "03:20", timezone: UTC}
    open-pull-requests-limit: 5
    labels: [dependencies, go]
    groups:
      go-runtime:
        patterns: ['golang.org/x/*']
  - package-ecosystem: github-actions
    directory: /
    schedule: {interval: weekly, day: monday, time: "03:40", timezone: UTC}
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
    groups:
      codeql-actions:
        patterns: ['github/codeql-action/*']
  - package-ecosystem: docker
    directory: /
    schedule: {interval: weekly, day: monday, time: "04:00", timezone: UTC}
    open-pull-requests-limit: 3
    labels: [dependencies, container]
