apiVersion: urn:agentapi-doctor:pack:v1
kind: ProtocolPack
metadata:
  name: ollama-native
  version: 2026.07.0
spec:
  engine:
    minVersion: 0.1.0
    maxMajor: 1
  protocolSnapshot:
    ref: specs/protocol-snapshots/ollama-native-2026-07-11.json
  scenarios:
    include:
      - scenarios/*.yaml
  conformanceSuites:
    candidate-normative:
      requirements:
        - catalog-normative
  defaultBudget:
    maxRequests: 48
    maxDuration: 15m0s
