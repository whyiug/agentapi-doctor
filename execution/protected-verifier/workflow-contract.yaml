{
  "schemaVersion": "urn:agentapi-doctor:protected-verifier-workflow-contract:v1alpha2",
  "kind": "ProtectedStateWorkflowContractCandidate",
  "id": "P00.B00-R3-protected-workflows",
  "contractStatus": "candidate-unapproved",
  "authoritative": "conditional-after-independent-R3-approval-and-live-protection-proof",
  "controlPlaneIncluded": true,
  "controlPlaneDigest": "sha256:622f5edc795e331628ba22a9d6e52a3842e0f1912488aa1739663d62e2d269f8",
  "workflows": {
    "controlPlane": ".github/workflows/p00-protected-control-plane.yml",
    "crossPlatform": ".github/workflows/p00-bootstrap-cross-platform.yml",
    "stateWriter": ".github/workflows/p00-protected-state-writer.yml",
    "historicalR2ReadOnlyCandidate": ".github/workflows/p00-protected-verifier-candidate.yml"
  },
  "purpose": "In strict genesis mode verify the exact independently signed R3 control plane and construct one digest-bound Genesis artifact; in strict append mode replay an immutable artifact-id/run-id-pinned raw chain and append exactly one bundle-authorized OIDC event, always without repository write permission.",
  "trigger": {
    "stateWriterEvent": "workflow_dispatch",
    "modes": ["append", "genesis"],
    "repository": "whyiug/agentapi-doctor",
    "requiredWorkflowRef": "refs/heads/main",
    "requiredRefProtectedClaim": "true",
    "candidateInput": "full lowercase 40-hex Git commit",
    "workflowExecutionInput": "full lowercase 40-hex main commit equal to github.sha",
    "approvalInput": "genesis only: canonical base64 of a detached R3 SSHSIG approval; data only",
    "appendChainInput": "append only: same-repository numeric run ID plus immutable numeric artifact ID containing exactly chain.json",
    "appendBundleInput": "append only: same-repository numeric run ID plus immutable numeric artifact ID containing exactly authorization-bundle.json",
    "appendPins": ["bootstrapRequestCommit", "currentChainHeadDigest", "workflowExecutionCommit", "operation", "toState", "phase", "conditionalWorkUnit", "optionalAuthorizationBundleDigest"]
  },
  "permissions": {
    "githubToken": {"metadata": "implicit read-only GitHub App permission", "contents": "read", "actions": "read", "allUnspecifiedConfigurablePermissions": "none"},
    "idToken": "write only in the state-writer job after approval validation",
    "secrets": [],
    "contentsWrite": false,
    "createsOrApprovesPullRequests": false,
    "forcePush": false
  },
  "directoryBoundary": {
    "trustedCode": "exact workflowExecutionCommit checkout from protected main; every executed control-plane component must byte/digest-match the independently approved candidateSourceCommit",
    "candidateComparisonData": "exact candidateSourceCommit checkout; parsed only as data by protected-main code",
    "requestAndWorkflowProof": "exact workflowExecutionCommit checkout",
    "approvalData": "runner temporary file decoded from workflow input",
    "appendArtifactData": "chain and authorization bundle are downloaded only by immutable numeric artifact ID and numeric run ID from the same fixed repository, normalized to fixed regular filenames, parsed only as data, and never executed",
    "candidateCodeMayExecute": false,
    "protectedMainCodeMayExecute": true,
    "protectedMainCodeCondition": "workflowExecutionCommit equals github.sha and all executed component digests exactly equal the independently approved candidateSourceCommit",
    "approvalCodeMayExecute": false,
    "onlyApprovedControlPlaneCodeMayExecute": true
  },
  "portableHumanSignatureVerifier": {
    "entrypoint": "tools/phasegate/protected_v2.py",
    "implementation": ["tools/phasegate/sshsig.py", "tools/phasegate/digest.py"],
    "profile": "OpenSSH SSHSIG v1 with comment-free Ed25519, SHA-256/SHA-512, empty reserved field, strict canonical payload",
    "externalBinaryRequired": false
  },
  "oidcStateWriter": {
    "entrypoint": "tools/phasegate/main.py protected-chain-append",
    "implementation": ["tools/phasegate/workflow_orchestrator.py", "tools/phasegate/evidence_index.py", "tools/phasegate/phase_evidence.py", "tools/phasegate/phase_bundle.py", "tools/phasegate/execution_artifact.py", "tools/phasegate/run_executor.py", "tools/phasegate/post_event_writer.py", "tools/phasegate/state_writer.py", "tools/phasegate/oidc.py", "tools/phasegate/oidc_provenance.py", "tools/phasegate/protected_v2.py", "tools/phasegate/provenance.py", "tools/phasegate/digest.py"],
    "signatureScheme": "github-actions-oidc-jwt-rs256-v1",
    "audience": "exact prefix plus canonical StateEvent statement digest",
    "offlineJwksPath": "execution/protected-verifier/github-actions-oidc-jwks.json",
    "onlineJwksRefreshDuringReplay": false,
    "selfVerificationBeforeArtifact": true,
    "candidateOrApprovalMaySelectKey": false,
    "defaultAppendTokenProvider": "GitHub Actions OIDC environment provider after every chain/bundle/commit/head/operation pin passes"
  },
  "externalPins": [
    "candidateSourceCommit",
    "workflowExecutionCommit",
    "controlPlaneDigest",
    "requestDigest",
    "trustPolicyDigest",
    "jwksSnapshotDigest",
    "priorChainHeadDigest",
    "resultingChainHeadDigest"
  ],
  "actionPins": [
    {"repository": "actions/checkout", "version": "v4.3.1", "commit": "34e114876b0b11c390a56381ad16ebd13914f8d5"},
    {"repository": "actions/upload-artifact", "version": "v4.6.2", "commit": "ea165f8d65b6e75b540449e92b4886f43607fa02"},
    {"repository": "actions/download-artifact", "version": "v4.3.0", "commit": "d3f86a106a0bac45b974a628896c90dbdf5c8093"}
  ],
  "repositoryProtection": {
    "requiredVisibility": "public",
    "branch": "main",
    "requiredPolicy": "execution/protected-verifier/trust-policy.yaml#repositoryProtection",
    "liveProofRequired": true,
    "oidcRefProtectedRequired": true,
    "proofApi": ["GET repository metadata", "GET main branch", "GET effective rules for main", "GET repository rulesets", "GET exact active ruleset detail"],
    "rulesetDetailAndEffectiveRulesMustMatch": true,
    "apiLimitations": ["ruleset bypass actors not observable with read-only token"],
    "administratorOrNoBypassClaim": false,
    "compensatingControl": "independent SSHSIG approval of exact source, workflow execution commit, policy, and verifier",
    "currentRepositoryVisibility": "private",
    "currentProofStatus": "missing-blocks-authoritative-use",
    "privateFreeFallback": "none; OIDC provenance remains non-authoritative"
  },
  "runtime": {
    "runner": "ubuntu-24.04",
    "pythonDependencies": "stdlib only",
    "candidateDependencyInstall": "forbidden",
    "runAttempt": 1,
    "timeoutMinutes": 10,
    "toolchainRecordedInArtifact": true
  },
  "networkPolicy": {
    "checkout": "GitHub repository only through commit-pinned checkout",
    "oidc": "GitHub Actions HTTPS OIDC endpoint with digest-bound audience",
    "rulesets": "fixed read-only GitHub REST GET endpoints using implicit metadata read and contents:read; no mutation endpoint is reachable",
    "artifact": "GitHub Actions artifact service; append reads same-repository artifacts only by numeric run ID and immutable artifact ID with actions:read, and writes one-day immutable outputs",
    "dependencyInstall": "forbidden",
    "candidateArbitraryNetwork": "forbidden by approved code; hosted-runner egress isolation is not claimed",
    "networkIsolationEnforced": false,
    "limitation": "lack of hosted-runner egress firewall remains explicit and is not represented as isolation"
  },
  "outputs": {
    "genesisChain": "one canonical chain.json containing the detached approval and 00000000 Genesis event",
    "event": "one canonical Genesis or appended event containing the expired-after-minutes OIDC JWT",
    "updatedChain": "append mode atomically publishes canonical chain.json, event.json, phase-state.yaml, and verification-result.json",
    "derivedView": "one exact phase-state.yaml replay projection",
    "verificationSummary": "digest-only verification-result.json",
    "repositoryWrite": false,
    "import": "separate protected PR after independent local replay"
  },
  "failClosedConditions": [
    "mode is not exactly genesis or append, mode-specific inputs are absent, mixed, malformed, or mismatched",
    "R3 approval or any genesis external digest/commit pin is absent or mismatched",
    "append chain/bundle artifact ID or run ID is nonnumeric, cross-repository, absent, contains extra files/symlinks, or exceeds its bound",
    "append chain head, bootstrap request commit, current workflow commit, operation, to-state, exact P00 phase, required work-unit (or forbidden work-unit for phase aggregate), canonical bundle, or optional bundle digest pin is absent or mismatched",
    "main is not public and protected or OIDC ref_protected is not true",
    "workflow run is a rerun or workflowExecutionCommit differs from github.sha",
    "workflow file at the OIDC workflow_sha differs from the approved component digest",
    "reviewer identity, role, organization, COI, validity, SSHSIG, or reviewed decision coverage is invalid",
    "JWK snapshot is unapproved, changed, revoked, unknown, or refreshed online during replay",
    "candidate, request, approval, or artifact code would execute",
    "repository contents write, force push, automatic merge, or direct state import is requested",
    "public repository, protected main, effective Rulesets, exact active ruleset detail, or Rulesets evidence digest is missing or weaker than policy",
    "Genesis does not replay to the unique initial P00/P00.W01 ACTIVE state, or an append event does not replay to its exact pinned P00 phase/work-unit projection",
    "a lifecycle resume, impact/control invalidation, or control-plane supersession write is requested by this workflow revision"
