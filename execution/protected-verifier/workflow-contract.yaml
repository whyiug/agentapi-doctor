    "supportedOperations": ["evidence-attachment", "phase-transition", "work-unit-activation", "work-unit-convergence", "work-unit-readiness"],
    "unsupportedLifecycleWrites": ["work-unit-control-invalidation", "work-unit-impact-invalidation", "work-unit-resume", "work-unit-supersession"]
