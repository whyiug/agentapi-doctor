  "genesisWriter": {
    "present": true,
    "authorized": "only after all fail-closed conditions are false",
    "writesRepository": false,
    "createsSignedArtifact": true,
    "currentStatus": "candidate-blocked-by-private-unprotected-repository-and-missing-R3-approval"
