  "activation": {
    "status": "candidate-non-authoritative",
    "mayProduceApprovalFact": false,
    "mayCreateGenesisArtifact": "conditional",
    "mayImportOrActivateState": false,
    "nextRequiredAction": "Complete R3 tests/request and independent approval, then establish public protected main and verify live protection before dispatch."
