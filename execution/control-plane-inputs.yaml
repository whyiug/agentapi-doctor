  "excluded": [
    {
      "path": "execution/approval-requests/**",
      "reason": "review request binds the already computed digest and cannot be a self-referential exam input"
    },
    {
      "path": "execution/approvals/**",
      "reason": "independent approval evidence is not agent-authored control plane"
    },
    {
      "path": "execution/blockers.md",
      "reason": "append-only runtime blocker log is execution evidence, not a protected evaluator input"
    },
    {
      "path": "execution/decisions.md",
      "reason": "append-only implementation decision log is execution evidence; normative decisions still require approved RFC/control-plane inputs"
    },
    {
      "path": "execution/phase-state.yaml",
      "reason": "forbidden before protected Genesis and generated afterward"
    },
    {
      "path": "execution/progress.md",
      "reason": "append-only runtime checkpoint log is execution evidence, not a protected evaluator input"
    },
    {
      "path": "execution/transitions/**",
      "reason": "forbidden before protected Genesis; append-only state evidence afterward"
    },
    {
      "path": "execution/gates/p00/evidence/**",
      "reason": "completion evidence is an output and forbidden in B00"
    },
    {
      "path": "execution/gates/p00/latest.json",
      "reason": "completion pointer is an output and forbidden in B00"
    },
    {
      "path": "execution/waivers.yaml",
      "reason": "human-signed development waiver data never changes a criterion result and is not agent-authored control plane"
    }
  ]
